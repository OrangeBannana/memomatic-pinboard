<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memomatic Admin</title>
  <style>
    /* ---- Design tokens ---- */
    :root {
      color-scheme: dark;

      /* Backgrounds */
      --bg:            #0f1117;
      --surface:       #181c26;
      --surface-2:     #1f2333;

      /* Borders */
      --border:        rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);

      /* Text */
      --text:          #ede9df;
      --text-muted:    rgba(237, 233, 223, 0.58);
      --text-dim:      rgba(237, 233, 223, 0.32);

      /* Interactive */
      --accent:        #5b9cf6;
      --accent-bg:     rgba(91, 156, 246, 0.14);
      --danger:        #e05770;
      --danger-bg:     rgba(224, 87, 112, 0.12);

      /* Geometry */
      --radius:        12px;
      --radius-sm:     8px;
      --radius-pill:   999px;

      /* Elevation */
      --shadow-sm:     0 2px 8px rgba(0, 0, 0, 0.30);
      --shadow:        0 4px 24px rgba(0, 0, 0, 0.44);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -8%, rgba(91, 156, 246, 0.07), transparent);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ---- Site header (sticky glass bar) ---- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(15, 17, 23, 0.80);
      backdrop-filter: blur(18px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }

    .site-header-brand { line-height: 1.2; }
    .site-header-brand strong { font-size: 15px; font-weight: 700; }
    .site-header-brand span {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
    }

    .site-header a {
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ---- Layout ---- */
    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .row h2 { margin: 0; }

    .hidden { display: none !important; }

    /* ---- Text helpers ---- */
    .subtle { color: var(--text-muted); font-size: 13px; }
    label   { color: var(--text-muted); font-size: 13px; }
    .meta   { color: var(--text-dim);   font-size: 13px; }

    /* ---- Panels ---- */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    /* ---- Forms / controls ---- */
    form, .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    /* ---- Inputs ---- */
    input[type="file"],
    input[type="password"],
    input[type="number"],
    input[type="text"],
    select {
      flex: 1 1 200px;
      min-width: 0;
      appearance: none;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      transition: border-color 140ms, box-shadow 140ms;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 156, 246, 0.18);
    }

    input[type="file"] {
      cursor: pointer;
      color: var(--text-muted);
    }

    input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    select option {
      background: var(--surface-2);
      color: var(--text);
    }

    /* ---- Buttons ---- */
    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: var(--radius-pill);
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 140ms, background 140ms;
    }

    button:hover   { opacity: 0.86; }
    button:disabled { opacity: 0.38; cursor: wait; }

    button.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-color: var(--border-strong);
    }
    button.secondary:hover { background: rgba(255, 255, 255, 0.10); opacity: 1; }

    button.danger {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: rgba(224, 87, 112, 0.32);
    }
    button.danger:hover { background: rgba(224, 87, 112, 0.22); opacity: 1; }

    /* ---- Status message ---- */
    #status {
      min-height: 20px;
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ---- Settings grid ---- */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 12px;
      margin-top: 6px;
    }

    .setting {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ---- QR codes ---- */
    .qr-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .qr-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qr-box strong {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .qr-box img {
      width: 136px;
      height: 136px;
      display: block;
      background: #fff;
      border-radius: 6px;
    }

    .copy-text {
      width: 100%;
      font-size: 12px;
      flex: 1 1 auto;
    }

    /* ---- Image grid ---- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color 140ms;
    }

    .card:hover { border-color: var(--border-strong); }
    .card.inactive { opacity: 0.50; }

    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #08080e;
    }

    .card-body { padding: 10px; }

    .name {
      min-height: 34px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-block;
      margin-top: 3px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .actions button {
      padding: 7px 8px;
      font-size: 12px;
      border-radius: var(--radius-sm);
    }

    /* ---- Empty state ---- */
    .empty {
      padding: 32px 24px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-brand">
      <strong>Memomatic Pinboard</strong>
      <span>Owner controls</span>
    </div>
    <a href="/frame">Open frame →</a>
  </header>
  <main>
    <section id="login-panel" class="panel">
      <h2>Owner Login</h2>
      <form id="login-form">
        <input id="owner-token" type="password" placeholder="Owner token" autocomplete="current-password" required>
        <button type="submit">Unlock</button>
      </form>
      <div class="subtle">Default token for this build is the configured owner token.</div>
    </section>

    <div id="admin-panels" class="hidden">
      <section class="panel">
        <div class="row">
          <h2>Upload</h2>
          <button id="logout-button" class="secondary" type="button">Lock</button>
        </div>
        <form id="upload-form">
          <input id="file" type="file" name="file" accept="image/jpeg,image/png,image/webp" required>
          <button id="upload-button" type="submit">Upload</button>
        </form>
        <div id="status"></div>
      </section>

      <section class="panel">
        <div class="row">
          <h2>Links</h2>
          <button id="regenerate-guest" class="secondary" type="button">New Guest Link</button>
        </div>
        <div class="controls" style="margin-top: 12px;">
          <label class="row" style="justify-content: start;">
            <input id="guest-enabled" type="checkbox">
            Guest uploads enabled
          </label>
          <button id="save-guest" type="button">Save Guest Setting</button>
        </div>
        <div class="qr-row">
          <div class="qr-box">
            <strong>Admin</strong>
            <img id="admin-qr" alt="Admin QR">
            <input id="admin-url" class="copy-text" type="text" readonly>
          </div>
          <div class="qr-box">
            <strong>Guest Upload</strong>
            <img id="guest-qr" alt="Guest QR">
            <input id="guest-url" class="copy-text" type="text" readonly>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="row">
          <h2>Network</h2>
          <button id="refresh-networks" class="secondary" type="button">Refresh Wi-Fi</button>
        </div>
        <div class="subtle" style="margin-top: 8px;">Join a Wi-Fi network from the admin page. The Pi will connect using NetworkManager.</div>
        <div id="network-status" class="meta" style="margin-top: 10px;"></div>
        <div style="margin-top: 12px; display: grid; gap: 12px;">
          <label class="setting">
            Available networks
            <select id="wifi-network"></select>
          </label>
          <div class="controls">
            <input id="wifi-ssid" type="text" placeholder="Or type SSID manually">
            <input id="wifi-password" type="password" placeholder="Wi-Fi password (optional for open networks)">
          </div>
          <label class="row" style="justify-content: start;">
            <input id="wifi-hidden" type="checkbox">
            Hidden network
          </label>
          <div class="controls">
            <button id="connect-network" type="button">Connect Wi-Fi</button>
            <button id="save-network" class="secondary" type="button">Save for later</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Display Settings</h2>
        <div class="settings-grid">
          <label class="setting">
            Slide seconds
            <input id="slide-seconds" type="number" min="5" max="120" step="1">
          </label>
          <label class="setting">
            Background blur
            <input id="backdrop-blur" type="number" min="0" max="24" step="1">
          </label>
          <label class="setting">
            Background brightness
            <input id="backdrop-brightness" type="number" min="0.25" max="1" step="0.05">
          </label>
          <label class="setting">
            Message display seconds
            <input id="message-display-seconds" type="number" min="3" max="30" step="1">
          </label>
        </div>
        <button id="save-settings" type="button" style="margin-top: 12px;">Save Display Settings</button>
      </section>

      <section class="panel">
        <div class="row">
          <h2>Images</h2>
          <span id="image-count" class="meta"></span>
        </div>
        <div id="images" class="grid" style="margin-top: 12px;"></div>
      </section>
    </div>
  </main>

  <script>
    const loginPanel = document.getElementById('login-panel');
    const adminPanels = document.getElementById('admin-panels');
    const loginForm = document.getElementById('login-form');
    const ownerTokenInput = document.getElementById('owner-token');
    const logoutButton = document.getElementById('logout-button');
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file');
    const uploadButton = document.getElementById('upload-button');
    const statusEl = document.getElementById('status');
    const imagesEl = document.getElementById('images');
    const imageCount = document.getElementById('image-count');
    const guestEnabled = document.getElementById('guest-enabled');
    const saveGuest = document.getElementById('save-guest');
    const regenerateGuest = document.getElementById('regenerate-guest');
    const adminUrl = document.getElementById('admin-url');
    const guestUrl = document.getElementById('guest-url');
    const adminQr = document.getElementById('admin-qr');
    const guestQr = document.getElementById('guest-qr');
    const refreshNetworks = document.getElementById('refresh-networks');
    const wifiNetwork = document.getElementById('wifi-network');
    const wifiSsid = document.getElementById('wifi-ssid');
    const wifiPassword = document.getElementById('wifi-password');
    const wifiHidden = document.getElementById('wifi-hidden');
    const connectNetwork = document.getElementById('connect-network');
    const networkStatus = document.getElementById('network-status');
    const slideSeconds = document.getElementById('slide-seconds');
    const backdropBlur = document.getElementById('backdrop-blur');
    const backdropBrightness = document.getElementById('backdrop-brightness');
    const messageDisplaySeconds = document.getElementById('message-display-seconds');
    const saveSettings = document.getElementById('save-settings');
    const saveNetwork = document.getElementById('save-network');

    let ownerToken = localStorage.getItem('pinboardOwnerToken') || '';

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function authHeaders(extra = {}) {
      return { ...extra, 'X-Pinboard-Owner-Token': ownerToken };
    }

    async function api(path, options = {}) {
      options.headers = authHeaders(options.headers || {});
      const response = await fetch(path, options);
      if (!response.ok) {
        let detail = response.statusText;
        try {
          const body = await response.json();
          detail = body.detail || detail;
        } catch (_) {}
        throw new Error(detail);
      }
      return response.json();
    }

    function showAdmin(show) {
      loginPanel.classList.toggle('hidden', show);
      adminPanels.classList.toggle('hidden', !show);
    }

    function qrUrl(value) {
      return `/api/qr.svg?data=${encodeURIComponent(value)}`;
    }

    function applySettings(settings) {
      guestEnabled.checked = settings.guest_enabled;
      adminUrl.value = settings.admin_url;
      guestUrl.value = settings.guest_url;
      adminQr.src = qrUrl(settings.admin_url);
      guestQr.src = qrUrl(settings.guest_url);
      slideSeconds.value = settings.slide_seconds;
      backdropBlur.value = settings.backdrop_blur_px;
      backdropBrightness.value = settings.backdrop_brightness;
      messageDisplaySeconds.value = settings.message_display_seconds;
    }

    function setNetworkStatus(message) {
      networkStatus.textContent = message || '';
    }

    async function loadWifiNetworks() {
      setNetworkStatus('Scanning Wi-Fi networks...');
      wifiNetwork.innerHTML = '<option value="">Scanning...</option>';
      try {
        const data = await api('/api/network/wifi', { cache: 'no-store' });
        wifiNetwork.innerHTML = '';
        const emptyOption = document.createElement('option');
        emptyOption.value = '';
        emptyOption.textContent = 'Select a network';
        wifiNetwork.appendChild(emptyOption);
        for (const network of data.networks || []) {
          const option = document.createElement('option');
          option.value = network.ssid;
          option.textContent = `${network.ssid} (${network.signal}%, ${network.security || '--'})${network.active === '1' ? ' [connected]' : ''}`;
          wifiNetwork.appendChild(option);
        }
        setNetworkStatus(data.networks?.length ? 'Wi-Fi networks loaded.' : 'No Wi-Fi networks found.');
      } catch (error) {
        wifiNetwork.innerHTML = '<option value="">Unable to scan</option>';
        setNetworkStatus(error.message);
      }
    }

    async function loadSettings() {
      const data = await api('/api/settings', { cache: 'no-store' });
      applySettings(data.settings);
    }

    async function loadImages() {
      const data = await api('/api/images', { cache: 'no-store' });
      imagesEl.innerHTML = '';
      imageCount.textContent = `${data.images.length} total`;
      if (!data.images.length) {
        imagesEl.innerHTML = '<div class="empty">No images yet.</div>';
        return;
      }

      for (const image of data.images) {
        const card = document.createElement('article');
        card.className = `card ${image.status === 'active' ? '' : 'inactive'}`;
        const activeActions = image.status === 'active'
          ? `<button class="secondary" data-action="push">Push next</button>
             <button class="secondary" data-action="hide">Hide</button>`
          : `<button class="secondary" data-action="restore">Restore</button>
             <button class="danger" data-action="delete">Delete</button>`;
        card.innerHTML = `
          <img class="thumb" src="${image.url}?t=${Date.now()}" alt="">
          <div class="card-body">
            <div class="name"></div>
            <span class="badge"></span>
            <div class="actions">
              ${activeActions}
              ${image.status === 'active' ? '<button class="danger" data-action="delete">Delete</button>' : ''}
            </div>
          </div>
        `;
        card.querySelector('.name').textContent = image.original_name;
        card.querySelector('.badge').textContent = `${image.status} · ${image.source}`;
        const push = card.querySelector('[data-action="push"]');
        const hide = card.querySelector('[data-action="hide"]');
        const restore = card.querySelector('[data-action="restore"]');
        const del = card.querySelector('[data-action="delete"]');
        if (push) push.addEventListener('click', async () => {
          await api(`/api/images/${image.id}/push-next`, { method: 'POST' });
          setStatus('Image will show next.');
        });
        if (hide) hide.addEventListener('click', async () => {
          await api(`/api/images/${image.id}/hide`, { method: 'POST' });
          setStatus('Image hidden.');
          await loadImages();
        });
        if (restore) restore.addEventListener('click', async () => {
          await api(`/api/images/${image.id}/restore`, { method: 'POST' });
          setStatus('Image restored.');
          await loadImages();
        });
        if (del) del.addEventListener('click', async () => {
          await api(`/api/images/${image.id}`, { method: 'DELETE' });
          setStatus('Image deleted.');
          await loadImages();
        });
        imagesEl.appendChild(card);
      }
    }

    async function loadAll() {
      await loadSettings();
      await loadImages();
      await loadWifiNetworks();
      showAdmin(true);
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      ownerToken = ownerTokenInput.value;
      localStorage.setItem('pinboardOwnerToken', ownerToken);
      try {
        await loadAll();
        setStatus('Unlocked.');
      } catch (error) {
        localStorage.removeItem('pinboardOwnerToken');
        ownerToken = '';
        setStatus(error.message);
      }
    });

    logoutButton.addEventListener('click', () => {
      localStorage.removeItem('pinboardOwnerToken');
      ownerToken = '';
      ownerTokenInput.value = '';
      showAdmin(false);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!fileInput.files.length) return;
      uploadButton.disabled = true;
      setStatus('Uploading...');
      try {
        const body = new FormData();
        body.append('file', fileInput.files[0]);
        await api('/api/images', { method: 'POST', body });
        fileInput.value = '';
        setStatus('Uploaded.');
        await loadImages();
      } catch (error) {
        setStatus(error.message);
      } finally {
        uploadButton.disabled = false;
      }
    });

    saveGuest.addEventListener('click', async () => {
      const data = await api('/api/settings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guest_enabled: guestEnabled.checked })
      });
      applySettings(data.settings);
      setStatus('Guest setting saved.');
    });

    regenerateGuest.addEventListener('click', async () => {
      const data = await api('/api/settings/guest-token', { method: 'POST' });
      applySettings(data.settings);
      setStatus('Guest link regenerated.');
    });

    saveSettings.addEventListener('click', async () => {
      const data = await api('/api/settings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slide_seconds: Number(slideSeconds.value),
          backdrop_blur_px: Number(backdropBlur.value),
          backdrop_brightness: Number(backdropBrightness.value),
          message_display_seconds: Number(messageDisplaySeconds.value),
        })
      });
      applySettings(data.settings);
      setStatus('Display settings saved.');
    });

    refreshNetworks.addEventListener('click', async () => {
      await loadWifiNetworks();
    });

    wifiNetwork.addEventListener('change', () => {
      if (wifiNetwork.value) {
        wifiSsid.value = wifiNetwork.value;
      }
    });

    connectNetwork.addEventListener('click', async () => {
      const ssid = (wifiSsid.value || wifiNetwork.value || '').trim();
      if (!ssid) {
        setNetworkStatus('Choose or type an SSID first.');
        return;
      }
      setNetworkStatus('Connecting to Wi-Fi...');
      try {
        const response = await api('/api/network/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ssid,
            password: wifiPassword.value,
            hidden: wifiHidden.checked,
          })
        });
        setNetworkStatus(response.message || `Connecting to ${ssid}...`);
      } catch (error) {
        setNetworkStatus(error.message);
      }
    });

    saveNetwork.addEventListener('click', async () => {
      const ssid = (wifiSsid.value || wifiNetwork.value || '').trim();
      if (!ssid) {
        setNetworkStatus('Choose or type an SSID first.');
        return;
      }
      setNetworkStatus('Saving network...');
      try {
        const response = await api('/api/network/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ssid,
            password: wifiPassword.value,
            hidden: wifiHidden.checked,
          })
        });
        setNetworkStatus(response.message || `Network '${ssid}' saved.`);
      } catch (error) {
        setNetworkStatus(error.message);
      }
    });

    if (ownerToken) {
      loadAll().catch(() => showAdmin(false));
    } else {
      showAdmin(false);
    }
    window.setInterval(() => {
      if (ownerToken) loadImages().catch(() => {});
    }, 10000);
  </script>
</body>
</html>
