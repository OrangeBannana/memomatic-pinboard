<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memomatic Frame</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050506;
      color: #f5f5f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      background: #050506;
      touch-action: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      overflow: hidden;
      transition: opacity 650ms ease;
    }

    .slide.visible { opacity: 1; }

    .slide .backdrop {
      position: absolute;
      inset: 0;
      background-position: center;
      background-size: cover;
      filter: blur(var(--backdrop-blur, 8px)) saturate(1.03) brightness(var(--backdrop-brightness, 0.68));
    }

    .slide .backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    .slide img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      pointer-events: none;
    }

    #empty {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      place-items: center;
      text-align: center;
      color: #f8f5e9;
      pointer-events: none;
    }
    #empty.visible { display: grid; }
    #empty h1 { margin: 0 0 6px; font-size: 20px; font-weight: 700; }
    #empty p  { margin: 0; font-size: 13px; color: #cfc9b8; }

    /* ── Clock overlay ── */
    #clock {
      position: fixed;
      z-index: 2;
      display: none;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      line-height: 1;
      color: #ffffff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.75), 0 0 14px rgba(0,0,0,0.5);
      padding: 8px 14px;
      border-radius: 12px;
      background: rgba(0,0,0,0.24);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      pointer-events: none;
      letter-spacing: 0.01em;
    }
    #clock.visible { display: block; }
    #clock.size-small  { font-size: 22px; }
    #clock.size-medium { font-size: 36px; }
    #clock.size-large  { font-size: 56px; }
    #clock.corner-top-left     { top: 16px;    left: 16px;  }
    #clock.corner-top-right    { top: 16px;    right: 16px; }
    #clock.corner-bottom-left  { bottom: 16px; left: 16px;  }
    #clock.corner-bottom-right { bottom: 16px; right: 16px; }

    /* ── Menu overlay ── */
    .menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
      background: linear-gradient(to top, rgba(0,0,0,0.4), rgba(0,0,0,0.02) 60%);
      backdrop-filter: blur(4px);
      touch-action: manipulation;
    }
    .menu-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    /* When keyboard is open, panel floats to top */
    .menu-overlay.kbd-open {
      justify-content: flex-start;
      padding-top: 4px;
    }

    .menu-panel {
      width: min(96vw, 440px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(18,18,20,0.72);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      color: #f6f4ef;
      overflow: hidden;
      pointer-events: auto;
    }

    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px 6px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      min-height: 48px;
    }

    .menu-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .menu-ip {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    .menu-close {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font: inherit;
      /* 44×44 minimum touch target for resistive touchscreen */
      width: 44px;
      height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      touch-action: manipulation;
      font-size: 16px;
    }

    .menu-body {
      padding: 8px 10px;
      display: grid;
      gap: 8px;
    }

    #menu-main { display: grid; gap: 8px; }
    #menu-main .menu-button { width: 100%; box-sizing: border-box; }

    .menu-button,
    .menu-primary {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      /* 48px minimum touch target for resistive touchscreen */
      min-height: 48px;
      padding: 11px 16px;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* ── Network form ── */
    .network-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .network-panel.open { display: flex; }

    .network-panel input[type="text"],
    .network-panel input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      /* 44px min touch height for resistive touchscreen */
      min-height: 44px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font: inherit;
      font-size: 14px;
      caret-color: #fff;
    }
    .network-panel input:focus { outline: none; border-color: rgba(255,255,255,0.4); }

    .network-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
    }

    .network-actions {
      display: flex;
      gap: 8px;
    }
    .network-actions > * { flex: 1; }

    .network-status {
      min-height: 18px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      line-height: 1.3;
    }

    /* ── Toast ── */
    .message-toast {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px 24px;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      line-height: 1.4;
      transform: translateY(-110%);
      opacity: 0;
      transition: transform 360ms cubic-bezier(0.34,1.28,0.64,1), opacity 260ms ease;
      pointer-events: none;
    }
    .message-toast.visible { transform: translateY(0); opacity: 1; }

    /* ── Onscreen keyboard ── */
    #kbd {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(28,28,30,0.98);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 4px 3px 6px;
      display: none;
      flex-direction: column;
      gap: 3px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    #kbd.open { display: flex; }

    .kbd-row {
      display: flex;
      gap: 3px;
      justify-content: center;
    }

    .kbd-key {
      flex: 1;
      /* 36px: practical minimum given full keyboard width on 480px screen */
      height: 36px;
      border: none;
      border-radius: 5px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      min-width: 0;
      padding: 0;
    }
    .kbd-key:active { background: rgba(255,255,255,0.38); }
    .kbd-fn   { flex: 0 0 48px; background: rgba(255,255,255,0.09); font-size: 11px; }
    .kbd-wide { flex: 0 0 44px; background: rgba(255,255,255,0.09); font-size: 11px; }
    .kbd-space { flex: 4; background: rgba(255,255,255,0.14); font-size: 11px; }

    /* ── Clock menu sub-panel ── */
    .clock-panel {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .clock-panel.open { display: flex; }
    .clock-section-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: -2px;
    }
    .seg-row {
      display: grid;
      gap: 6px;
    }
    .seg-row.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .seg-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .seg-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      min-height: 48px;
      padding: 8px 6px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .seg-btn.active {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <main id="stage">
    <div id="slide-a" class="slide"><div class="backdrop"></div><img alt=""></div>
    <div id="slide-b" class="slide"><div class="backdrop"></div><img alt=""></div>
    <section id="empty">
      <div>
        <h1>Memomatic</h1>
        <p>Waiting for images</p>
      </div>
    </section>
    <div id="message-toast" class="message-toast" aria-live="assertive"></div>
    <div id="clock" class="corner-bottom-right size-medium" aria-hidden="true"></div>

    <div id="menu-overlay" class="menu-overlay" aria-hidden="true">
      <div class="menu-panel" role="dialog" aria-label="Device menu">
        <div class="menu-header">
          <span class="menu-title">Menu</span>
          <span id="device-ip" class="menu-ip"></span>
          <button id="menu-close" class="menu-close" type="button" aria-label="Close">×</button>
        </div>
        <div class="menu-body">
          <!-- main options -->
          <div id="menu-main">
            <button id="mode-option" class="menu-button" type="button">Mode: All</button>
            <button id="clock-option" class="menu-button" type="button">Clock settings</button>
            <button id="wifi-option" class="menu-button" type="button">Add Wi-Fi network</button>
            <button id="bt-option" class="menu-button" type="button">Bluetooth pairing</button>
          </div>
          <!-- bluetooth panel (reuses clock-panel show/hide styling) -->
          <div id="bt-panel" class="clock-panel">
            <div id="bt-status" class="network-status">Checking Bluetooth…</div>
            <button id="bt-pair" class="menu-primary" type="button">Start pairing (3 min)</button>
            <button id="bt-back" class="menu-button" type="button">Done</button>
          </div>
          <!-- clock settings panel -->
          <div id="clock-panel" class="clock-panel">
            <div class="seg-row cols-2">
              <button class="seg-btn" id="clock-toggle" type="button">Clock: Off</button>
              <button class="menu-button" id="clock-back" type="button">Done</button>
            </div>
            <div class="clock-section-label">Position</div>
            <div class="seg-row cols-2">
              <button class="seg-btn" data-corner="top-left" type="button">Top left</button>
              <button class="seg-btn" data-corner="top-right" type="button">Top right</button>
              <button class="seg-btn" data-corner="bottom-left" type="button">Bottom left</button>
              <button class="seg-btn" data-corner="bottom-right" type="button">Bottom right</button>
            </div>
            <div class="clock-section-label">Size</div>
            <div class="seg-row cols-3">
              <button class="seg-btn" data-size="small" type="button">Small</button>
              <button class="seg-btn" data-size="medium" type="button">Medium</button>
              <button class="seg-btn" data-size="large" type="button">Large</button>
            </div>
          </div>
          <!-- network form -->
          <form id="network-panel" class="network-panel">
            <input id="network-ssid" type="text" placeholder="Network name (SSID)" autocomplete="off" readonly>
            <input id="network-password" type="password" placeholder="Password" autocomplete="off" readonly>
            <label class="network-row">
              <input id="network-hidden" type="checkbox"> Hidden network
            </label>
            <div class="network-actions">
              <button class="menu-primary" type="submit">Connect</button>
              <button id="network-cancel" class="menu-button" type="button">Cancel</button>
            </div>
            <div id="network-status" class="network-status"></div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Onscreen keyboard -->
  <div id="kbd" aria-hidden="true">
    <div class="kbd-row" id="krow0"></div>
    <div class="kbd-row" id="krow1"></div>
    <div class="kbd-row" id="krow2"></div>
    <div class="kbd-row">
      <button class="kbd-key kbd-fn" id="kbd-mode">123</button>
      <button class="kbd-key kbd-space" id="kbd-space">space</button>
      <button class="kbd-key kbd-fn" id="kbd-done">Done</button>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const d = await fetch('/api/color-schemes').then(r => r.json());
        const active = (d.schemes||[]).find(s => s.name === d.active_name) || (d.schemes||[])[0];
        if (active?.tokens) for (const [p,v] of Object.entries(active.tokens)) document.documentElement.style.setProperty(p,v);
      } catch(_) {}
    })();

    // ── Slideshow ──────────────────────────────────────────────────────────
    const slides = [document.getElementById('slide-a'), document.getElementById('slide-b')];
    const empty = document.getElementById('empty');
    const messageToast = document.getElementById('message-toast');
    let currentId = null, activeSlide = 0, pollMs = 2000, pollInterval = null;
    let currentMessageId = null, messageTimer = null;

    function setSlide(slide, url) {
      slide.querySelector('img').src = url;
      slide.querySelector('.backdrop').style.backgroundImage = `url("${url}")`;
    }

    function showMessage(msg, durationMs) {
      if (currentMessageId === msg.id) return;
      currentMessageId = msg.id;
      clearTimeout(messageTimer);
      messageToast.textContent = msg.content;
      messageToast.classList.add('visible');
      messageTimer = setTimeout(async () => {
        messageToast.classList.remove('visible');
        currentMessageId = null;
        try { await fetch(`/api/messages/${msg.id}/shown`, { method: 'POST' }); } catch (_) {}
      }, durationMs);
    }

    async function refresh() {
      try {
        const r = await fetch('/api/slideshow/current', { cache: 'no-store' });
        const data = await r.json();
        if (data.display) {
          document.documentElement.style.setProperty('--backdrop-blur', `${data.display.backdrop_blur_px}px`);
          document.documentElement.style.setProperty('--backdrop-brightness', String(data.display.backdrop_brightness));
        }
        if (data.clock) applyClockSettings(data.clock);
        if (data.slideshow_mode && Date.now() - modeChangedAt > 3000) applySlideshowMode(data.slideshow_mode);
        const newPollMs = Math.max(1000, Math.min(5000, Math.floor((data.slide_seconds || 15) * 1000 / 4)));
        if (newPollMs !== pollMs) {
          pollMs = newPollMs;
          clearInterval(pollInterval);
          pollInterval = setInterval(refresh, pollMs);
        }
        if (data.message) showMessage(data.message, (data.message_display_seconds || 8) * 1000);
        if (!data.image) {
          currentId = null;
          slides.forEach(s => s.classList.remove('visible'));
          empty.classList.add('visible');
          return;
        }
        empty.classList.remove('visible');
        if (data.image.id !== currentId) {
          currentId = data.image.id;
          const url = `${data.image.url}?t=${Date.now()}`;
          const next = new Image();
          next.onload = () => {
            const ni = activeSlide === 0 ? 1 : 0;
            setSlide(slides[ni], url);
            slides[ni].classList.add('visible');
            slides[activeSlide].classList.remove('visible');
            activeSlide = ni;
          };
          next.src = url;
        } else if (!slides[activeSlide].classList.contains('visible')) {
          slides[activeSlide].classList.add('visible');
        }
      } catch (e) { console.error(e); }
    }

    // ── Clock overlay ───────────────────────────────────────────────────────
    const clockEl = document.getElementById('clock');
    // Local mirror of server-side clock settings; updated whenever a poll or a
    // frame-menu change arrives. The frame menu writes via POST /api/frame/clock
    // (localhost dual-auth) so changes survive reboot and sync to the admin page.
    let clockState = { enabled: false, corner: 'bottom-right', size: 'medium' };

    function renderClockTime() {
      let h = new Date().getHours();
      const m = new Date().getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12; if (h === 0) h = 12;
      clockEl.textContent = `${h}:${String(m).padStart(2, '0')} ${ampm}`;
    }

    function applyClockSettings(clock) {
      clockState = {
        enabled: !!clock.enabled,
        corner: clock.corner || 'bottom-right',
        size: clock.size || 'medium',
      };
      clockEl.className = `corner-${clockState.corner} size-${clockState.size}` +
        (clockState.enabled ? ' visible' : '');
      if (clockState.enabled) renderClockTime();
    }
    setInterval(() => { if (clockState.enabled) renderClockTime(); }, 1000);

    // ── Slideshow mode ───────────────────────────────────────────────────────
    const MODE_LABELS = { all: 'All', images: 'Photos', memes: 'Memes' };
    const MODE_CYCLE  = { all: 'images', images: 'memes', memes: 'all' };
    let slideshowMode = 'all', modeChangedAt = 0;
    const modeOption = document.getElementById('mode-option');

    function renderModeLabel() {
      modeOption.textContent = `Mode: ${MODE_LABELS[slideshowMode] || 'All'}`;
    }
    function applySlideshowMode(mode) {
      slideshowMode = MODE_LABELS[mode] ? mode : 'all';
      renderModeLabel();
    }
    modeOption.addEventListener('click', async () => {
      const next = MODE_CYCLE[slideshowMode] || 'all';
      applySlideshowMode(next);          // optimistic
      modeChangedAt = Date.now();        // ignore stale poll values briefly
      try {
        const r = await fetch('/api/frame/mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slideshow_mode: next }),
        });
        const d = await r.json().catch(() => ({}));
        if (r.ok && d.slideshow_mode) applySlideshowMode(d.slideshow_mode);
      } catch (_) {}
    });

    // ── Menu ──────────────────────────────────────────────────────────────
    const menuOverlay = document.getElementById('menu-overlay');
    const menuMain    = document.getElementById('menu-main');
    const clockPanel  = document.getElementById('clock-panel');
    const btPanel     = document.getElementById('bt-panel');
    const networkPanel = document.getElementById('network-panel');
    const networkSsid  = document.getElementById('network-ssid');
    const networkPass  = document.getElementById('network-password');
    const networkHidden = document.getElementById('network-hidden');
    const networkCancel = document.getElementById('network-cancel');
    const networkStatus = document.getElementById('network-status');
    let menuVisible = false, connecting = false;

    function hideMenu() {
      menuVisible = false;
      menuOverlay.classList.remove('visible');
      menuOverlay.setAttribute('aria-hidden', 'true');
      networkPanel.classList.remove('open');
      clockPanel.classList.remove('open');
      btPanel.classList.remove('open');
      menuMain.style.display = '';
      networkStatus.textContent = '';
      hideKeyboard();
    }

    function showMenu() {
      menuVisible = true;
      menuOverlay.classList.add('visible');
      menuOverlay.setAttribute('aria-hidden', 'false');
      fetch('/api/network/ip').then(r => r.json()).then(d => {
        const el = document.getElementById('device-ip');
        if (!el) return;
        const parts = [];
        if (d.mdns && d.mdns !== 'unknown') parts.push(d.mdns + ':8080');
        if (d.ip && d.ip !== 'unknown') parts.push(d.ip);
        if (parts.length) el.textContent = parts.join('  ');
      }).catch(() => {});
    }

    function openNetworkPanel() {
      menuMain.style.display = 'none';
      networkPanel.classList.add('open');
      networkStatus.textContent = '';
    }

    async function connectNetwork(event) {
      event.preventDefault();
      const ssid = networkSsid.value.trim();
      if (!ssid) { networkStatus.textContent = 'Enter a network name.'; return; }
      connecting = true;
      networkStatus.textContent = 'Connecting…';
      try {
        const r = await fetch('/api/network/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ssid, password: networkPass.value, hidden: networkHidden.checked })
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || r.statusText || 'Unable to connect.');
        networkSsid.value = '';
        networkPass.value = '';
        networkHidden.checked = false;
        networkStatus.textContent = data.message || 'Connected.';
      } catch (e) {
        networkStatus.textContent = e.message;
      }
      connecting = false;
    }

    // ── Clock settings panel ───────────────────────────────────────────────
    const clockToggle = document.getElementById('clock-toggle');

    function refreshClockPanel() {
      clockToggle.textContent = `Clock: ${clockState.enabled ? 'On' : 'Off'}`;
      clockToggle.classList.toggle('active', clockState.enabled);
      clockPanel.querySelectorAll('[data-corner]').forEach(b =>
        b.classList.toggle('active', b.dataset.corner === clockState.corner));
      clockPanel.querySelectorAll('[data-size]').forEach(b =>
        b.classList.toggle('active', b.dataset.size === clockState.size));
    }

    function openClockPanel() {
      menuMain.style.display = 'none';
      clockPanel.classList.add('open');
      refreshClockPanel();
    }

    async function saveClock(patch) {
      // Optimistically apply locally so the change is instant, then persist.
      applyClockSettings({ ...clockState, ...patch });
      refreshClockPanel();
      try {
        const r = await fetch('/api/frame/clock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });
        const data = await r.json().catch(() => ({}));
        if (r.ok && data.clock) { applyClockSettings(data.clock); refreshClockPanel(); }
      } catch (_) {}
    }

    document.getElementById('clock-option').addEventListener('click', openClockPanel);
    document.getElementById('clock-back').addEventListener('click', () => {
      clockPanel.classList.remove('open');
      menuMain.style.display = '';
    });
    clockToggle.addEventListener('click', () => saveClock({ clock_enabled: !clockState.enabled }));
    clockPanel.querySelectorAll('[data-corner]').forEach(b =>
      b.addEventListener('click', () => saveClock({ clock_corner: b.dataset.corner })));
    clockPanel.querySelectorAll('[data-size]').forEach(b =>
      b.addEventListener('click', () => saveClock({ clock_size: b.dataset.size })));

    // ── Bluetooth panel ────────────────────────────────────────────────────
    const btStatus = document.getElementById('bt-status');
    const btPair   = document.getElementById('bt-pair');

    async function refreshBtStatus() {
      try {
        const d = await fetch('/api/bluetooth/status', { cache: 'no-store' }).then(r => r.json());
        const b = d.bluetooth || {};
        const name = b.alias || 'Memomatic';
        if (!b.available) {
          btStatus.textContent = 'No Bluetooth adapter found on this device.';
          btPair.disabled = true;
          return;
        }
        btPair.disabled = false;
        if (b.discoverable) {
          btStatus.textContent = `Pairing is ON — on your phone, pair with "${name}", then share a photo to it via Bluetooth.`;
        } else if (!b.enabled) {
          btStatus.textContent = `Bluetooth uploads are turned off in the admin page. Device name: "${name}".`;
        } else {
          btStatus.textContent = `Ready. Paired phones can share photos via Bluetooth to "${name}".`;
        }
      } catch (_) {
        btStatus.textContent = 'Bluetooth status unavailable.';
      }
    }

    function openBtPanel() {
      menuMain.style.display = 'none';
      btPanel.classList.add('open');
      btStatus.textContent = 'Checking Bluetooth…';
      refreshBtStatus();
    }

    document.getElementById('bt-option').addEventListener('click', openBtPanel);
    document.getElementById('bt-back').addEventListener('click', () => {
      btPanel.classList.remove('open');
      menuMain.style.display = '';
    });
    btPair.addEventListener('click', async () => {
      btStatus.textContent = 'Turning pairing on…';
      btPair.disabled = true;
      try {
        const r = await fetch('/api/bluetooth/pairing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: true }),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.detail || 'Unable to enable pairing.');
        await refreshBtStatus();
      } catch (e) {
        btStatus.textContent = e.message;
      }
      btPair.disabled = false;
    });

    document.getElementById('menu-close').addEventListener('click', hideMenu);
    document.getElementById('wifi-option').addEventListener('click', openNetworkPanel);
    networkCancel.addEventListener('click', () => { hideKeyboard(); networkPanel.classList.remove('open'); menuMain.style.display = ''; networkStatus.textContent = ''; });
    networkPanel.addEventListener('submit', connectNetwork);

    // ── Onscreen keyboard ─────────────────────────────────────────────────
    const kbd = document.getElementById('kbd');
    const KB_ALPHA = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
    const KB_NUM   = ['1234567890', '@#$%-+=_!?', '&*.,;:\'"('];
    let kbdMode = 'alpha', kbdShift = false, kbdTarget = null, kbdBlurTimer = null;

    function buildKbd() {
      const rows = kbdMode === 'alpha' ? KB_ALPHA : KB_NUM;
      document.getElementById('kbd-mode').textContent = kbdMode === 'alpha' ? '123' : 'ABC';
      rows.forEach((chars, i) => {
        const row = document.getElementById(`krow${i}`);
        row.innerHTML = '';
        // shift key on row 2 (alpha only)
        if (kbdMode === 'alpha' && i === 2) {
          const s = document.createElement('button');
          s.className = 'kbd-key kbd-wide'; s.dataset.action = 'shift';
          s.textContent = kbdShift ? '⇪' : '⇧'; row.appendChild(s);
        }
        for (const ch of chars) {
          const b = document.createElement('button');
          b.className = 'kbd-key';
          const disp = (kbdMode === 'alpha' && kbdShift) ? ch.toUpperCase() : ch;
          b.textContent = disp; b.dataset.char = disp; row.appendChild(b);
        }
        // backspace on row 0, enter on row 1
        if (i === 0) {
          const b = document.createElement('button');
          b.className = 'kbd-key kbd-wide'; b.dataset.action = 'bsp'; b.textContent = '⌫'; row.appendChild(b);
        }
        if (i === 1) {
          const b = document.createElement('button');
          b.className = 'kbd-key kbd-wide'; b.dataset.action = 'next'; b.textContent = '↵'; row.appendChild(b);
        }
      });
    }

    function showKeyboard(target) {
      clearTimeout(kbdBlurTimer);
      kbdTarget = target;
      kbdMode = 'alpha'; kbdShift = false;
      buildKbd();
      kbd.classList.add('open');
      kbd.setAttribute('aria-hidden', 'false');
      menuOverlay.classList.add('kbd-open');
    }

    function hideKeyboard() {
      clearTimeout(kbdBlurTimer);
      kbdTarget = null;
      kbd.classList.remove('open');
      kbd.setAttribute('aria-hidden', 'true');
      menuOverlay.classList.remove('kbd-open');
    }

    // readonly inputs so mobile browser doesn't open native keyboard;
    // remove readonly on focus so caret is visible
    [networkSsid, networkPass].forEach(inp => {
      inp.addEventListener('pointerdown', e => {
        e.stopPropagation();
        clearTimeout(kbdBlurTimer);
        showKeyboard(inp);
      });
      inp.addEventListener('focus', () => { inp.removeAttribute('readonly'); });
      inp.addEventListener('blur', () => {
        inp.setAttribute('readonly', '');
        kbdBlurTimer = setTimeout(hideKeyboard, 200);
      });
    });

    kbd.addEventListener('pointerdown', e => {
      e.stopPropagation();
      clearTimeout(kbdBlurTimer);
    });

    kbd.addEventListener('click', e => {
      e.stopPropagation();
      const btn = e.target.closest('.kbd-key');
      if (!btn) return;
      clearTimeout(kbdBlurTimer);

      const action = btn.dataset.action;
      if (action === 'shift') { kbdShift = !kbdShift; buildKbd(); return; }
      if (action === 'bsp')   { if (kbdTarget) kbdTarget.value = kbdTarget.value.slice(0,-1); return; }
      if (action === 'next')  {
        if (kbdTarget === networkSsid) { networkPass.focus(); showKeyboard(networkPass); }
        else hideKeyboard();
        return;
      }
      if (btn.id === 'kbd-mode')  { kbdMode = kbdMode === 'alpha' ? 'num' : 'alpha'; buildKbd(); return; }
      if (btn.id === 'kbd-space') { if (kbdTarget) kbdTarget.value += ' '; return; }
      if (btn.id === 'kbd-done')  { hideKeyboard(); return; }
      if (btn.dataset.char && kbdTarget) {
        kbdTarget.value += btn.dataset.char;
        if (kbdShift) { kbdShift = false; buildKbd(); }
      }
    });

    buildKbd();

    // ── Touch / pointer interaction ────────────────────────────────────────
    // Short tap  → show menu (if hidden) | hide menu (if visible and not in panel)
    // Long press (≥2 s) → open WiFi panel directly
    let lastInteraction = 0, pointerDownAt = 0, longPressTimer = null;
    let menuShownThisGesture = false, longPressActivated = false;

    // Startup grace period: ignore all gestures for the first few seconds after
    // load. At boot the touch bridge / Xorg can emit a phantom pointerdown with
    // no matching pointerup, which would show the menu and then trip the 2 s
    // long-press timer into opening the WiFi panel on its own. (see issue #23)
    const STARTUP_GRACE_MS = 4000;
    const startupAt = Date.now();
    function inStartupGrace() { return Date.now() - startupAt < STARTUP_GRACE_MS; }

    function cancelLongPress() { clearTimeout(longPressTimer); longPressTimer = null; }

    document.addEventListener('pointerdown', e => {
      // Don't interfere with keyboard
      if (e.target.closest('#kbd')) return;
      if (inStartupGrace()) return;
      const t = Date.now();
      if (t - lastInteraction < 150) return;
      lastInteraction = t;
      pointerDownAt = t;
      menuShownThisGesture = false;
      longPressActivated = false;

      if (menuVisible && e.target.closest('.menu-panel')) return;

      e.preventDefault();

      if (!menuVisible) { showMenu(); menuShownThisGesture = true; }

      if (!connecting) {
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          longPressActivated = true;
          if (!menuVisible) showMenu();
          openNetworkPanel();
        }, 2000);
      }
    }, { capture: true });

    document.addEventListener('pointerup', e => {
      if (e.target.closest('#kbd')) return;
      cancelLongPress();
      if (inStartupGrace()) { pointerDownAt = 0; return; }
      if (!pointerDownAt) return;
      pointerDownAt = 0;
      if (e.target.closest('.menu-panel')) return;
      if (menuVisible && !menuShownThisGesture && !longPressActivated && !connecting) hideMenu();
      menuShownThisGesture = false;
      longPressActivated = false;
    }, { capture: true, passive: false });

    // click fallback for drivers that emit click without pointer events
    document.addEventListener('click', e => {
      if (e.target.closest('#kbd')) return;
      if (inStartupGrace()) return;
      const t = Date.now();
      if (t - lastInteraction < 300) return;
      lastInteraction = t;
      if (e.target.closest('.menu-panel')) return;
      e.preventDefault();
      if (!menuVisible) showMenu();
      else if (!connecting) hideMenu();
    }, { capture: true });

    refresh();
    pollInterval = setInterval(refresh, pollMs);
  </script>
</body>
</html>
