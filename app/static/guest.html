<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send to Memomatic</title>
  <style>
    /* ---- Design tokens (matches admin.html / frame.html palette) ---- */
    :root {
      color-scheme: dark;

      --bg:            #0f1117;
      --surface:       #181c26;
      --surface-2:     #1f2333;
      --border:        rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);

      --text:          #ede9df;
      --text-muted:    rgba(237, 233, 223, 0.58);
      --text-dim:      rgba(237, 233, 223, 0.32);

      --accent:        #5b9cf6;
      --accent-bg:     rgba(91, 156, 246, 0.14);
      --danger:        #e05770;

      --radius:        12px;
      --radius-sm:     8px;
      --radius-pill:   999px;

      --shadow-sm:     0 2px 8px rgba(0, 0, 0, 0.30);
      --shadow:        0 4px 24px rgba(0, 0, 0, 0.44);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% -8%, rgba(91, 156, 246, 0.07), transparent);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    main {
      width: min(440px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      overflow: hidden;
      margin-bottom: 20px;
      padding: 3px;
      background: rgba(255, 255, 255, 0.04);
    }

    .tab {
      flex: 1;
      appearance: none;
      border: 1px solid transparent;
      border-radius: var(--radius-pill);
      padding: 9px 12px;
      background: transparent;
      color: var(--text-muted);
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms, color 140ms;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-color: transparent;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    p {
      margin: 0 0 16px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 12px;
    }

    /* ---- Inputs ---- */
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 140ms;
    }

    input[type="file"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 156, 246, 0.18);
    }

    textarea {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      resize: vertical;
      min-height: 96px;
      transition: border-color 140ms;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 156, 246, 0.18);
    }

    textarea::placeholder { color: var(--text-dim); }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: -6px;
    }

    .char-count.over { color: var(--danger); }

    /* ---- Button ---- */
    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: var(--radius-pill);
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 140ms;
    }

    button:hover   { opacity: 0.86; }
    button:disabled { opacity: 0.38; cursor: wait; }

    /* ---- Status ---- */
    #photo-status, #msg-status {
      min-height: 22px;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Send to Memomatic</h1>
    <div class="tabs">
      <button class="tab active" data-tab="photo" type="button">Photo</button>
      <button class="tab" data-tab="message" type="button">Message</button>
    </div>

    <div id="tab-photo" class="tab-panel active">
      <p>Your image will be added to the pinboard and shown next.</p>
      <form id="photo-form">
        <input id="file" type="file" name="file" accept="image/jpeg,image/png,image/webp" required>
        <button id="upload-button" type="submit">Send Photo</button>
      </form>
      <div id="photo-status"></div>
    </div>

    <div id="tab-message" class="tab-panel">
      <p>Your message will appear on screen for a few seconds.</p>
      <form id="msg-form">
        <textarea id="msg-text" placeholder="Type your message…" maxlength="200" required></textarea>
        <div class="char-count"><span id="char-count">0</span> / 200</div>
        <button id="msg-button" type="submit">Send Message</button>
      </form>
      <div id="msg-status"></div>
    </div>
  </main>

  <script>
    const token = "__GUEST_TOKEN__";

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // Photo upload
    const photoForm = document.getElementById('photo-form');
    const fileInput = document.getElementById('file');
    const uploadButton = document.getElementById('upload-button');
    const photoStatus = document.getElementById('photo-status');

    photoForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!fileInput.files.length) return;
      uploadButton.disabled = true;
      photoStatus.textContent = 'Sending...';
      try {
        const body = new FormData();
        body.append('file', fileInput.files[0]);
        const response = await fetch(`/api/guest/${token}/images`, { method: 'POST', body });
        if (!response.ok) {
          let detail = response.statusText;
          try { const d = await response.json(); detail = d.detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        fileInput.value = '';
        photoStatus.textContent = 'Sent. Watch the frame.';
      } catch (error) {
        photoStatus.textContent = error.message;
      } finally {
        uploadButton.disabled = false;
      }
    });

    // Message
    const msgForm = document.getElementById('msg-form');
    const msgText = document.getElementById('msg-text');
    const msgButton = document.getElementById('msg-button');
    const msgStatus = document.getElementById('msg-status');
    const charCount = document.getElementById('char-count');

    msgText.addEventListener('input', () => {
      const n = msgText.value.length;
      charCount.textContent = n;
      charCount.parentElement.classList.toggle('over', n > 200);
    });

    msgForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const content = msgText.value.trim();
      if (!content) return;
      msgButton.disabled = true;
      msgStatus.textContent = 'Sending...';
      try {
        const response = await fetch(`/api/guest/${token}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        if (!response.ok) {
          let detail = response.statusText;
          try { const d = await response.json(); detail = d.detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        msgText.value = '';
        charCount.textContent = '0';
        msgStatus.textContent = 'Sent. Watch the frame.';
      } catch (error) {
        msgStatus.textContent = error.message;
      } finally {
        msgButton.disabled = false;
      }
    });
  </script>
</body>
</html>
