<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Send to Memomatic</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:           #0b0b0e;
      --glass-bg:     rgba(20, 20, 28, 0.82);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-blur:   20px;
      --text:         #ede9e1;
      --text-muted:   rgba(237, 233, 225, 0.58);
      --text-subtle:  rgba(237, 233, 225, 0.30);
      --line:         rgba(255, 255, 255, 0.08);
      --accent:       #7c6af5;
      --accent-dim:   rgba(124, 106, 245, 0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px 12px;
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(124, 106, 245, 0.07) 0%, transparent 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    main {
      width: min(460px, 100%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px 20px;
      backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 18px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      appearance: none;
      border: none;
      border-radius: 0;
      min-height: 48px;
      padding: 11px 12px;
      background: transparent;
      color: var(--text-muted);
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms, color 140ms;
    }

    .tab:not(:last-child) { border-right: 1px solid var(--glass-border); }

    .tab.active {
      background: var(--accent);
      color: #fff;
      font-weight: 650;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Description text ── */
    p {
      margin-bottom: 14px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Form ── */
    form { display: grid; gap: 12px; }

    input[type="file"] {
      width: 100%;
      min-height: 52px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 140ms;
    }
    input[type="file"]:focus { outline: none; border-color: var(--accent); }

    textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      padding: 12px 14px;
      resize: vertical;
      transition: border-color 140ms;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--text-subtle); }

    select {
      width: 100%;
      min-height: 52px;
      background: rgba(20, 20, 28, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 140ms;
    }
    select:focus { outline: none; border-color: var(--accent); }
    select option { background: #14141c; color: var(--text); }

    .field-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: -6px;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-subtle);
      margin-top: -6px;
    }
    .char-count.over { color: #e85454; }

    button[type="submit"] {
      appearance: none;
      width: 100%;
      min-height: 52px;
      padding: 13px 20px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: 16px;
      font-weight: 650;
      cursor: pointer;
      transition: opacity 140ms, transform 80ms;
    }
    button[type="submit"]:disabled { opacity: 0.36; cursor: wait; }
    button[type="submit"]:not(:disabled):active { transform: scale(0.98); }
    button[type="submit"]:not(:disabled):hover { opacity: 0.86; }

    #photo-status, #msg-status {
      min-height: 22px;
      margin-top: 4px;
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Send to Memomatic</h1>

    <div class="tabs">
      <button class="tab active" data-tab="photo" type="button">Photo</button>
      <button class="tab" data-tab="message" type="button">Message</button>
    </div>

    <div id="tab-photo" class="tab-panel active">
      <p>Your image will be added to the pinboard and shown next.</p>
      <form id="photo-form">
        <input id="file" type="file" name="file" accept="image/jpeg,image/png,image/webp" required>
        <span class="field-label">Category</span>
        <select id="photo-category">
          <option value="image">Photo</option>
          <option value="meme">Meme</option>
        </select>
        <button id="upload-button" type="submit">Send Photo</button>
      </form>
      <div id="photo-status"></div>
    </div>

    <div id="tab-message" class="tab-panel">
      <p>Your message will appear on screen for a few seconds.</p>
      <form id="msg-form">
        <textarea id="msg-text" placeholder="Type your message…" maxlength="200" required></textarea>
        <div class="char-count"><span id="char-count">0</span> / 200</div>
        <button id="msg-button" type="submit">Send Message</button>
      </form>
      <div id="msg-status"></div>
    </div>
  </main>

  <script>
    (async () => {
      try {
        const d = await fetch('/api/color-schemes').then(r => r.json());
        const active = (d.schemes||[]).find(s => s.name === d.active_name) || (d.schemes||[])[0];
        if (active?.tokens) for (const [p,v] of Object.entries(active.tokens)) document.documentElement.style.setProperty(p,v);
      } catch(_) {}
    })();

    const token = "__GUEST_TOKEN__";

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      });
    });

    // Photo upload
    const photoForm = document.getElementById('photo-form');
    const fileInput = document.getElementById('file');
    const photoCategory = document.getElementById('photo-category');
    const uploadButton = document.getElementById('upload-button');
    const photoStatus = document.getElementById('photo-status');

    photoForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!fileInput.files.length) return;
      uploadButton.disabled = true;
      photoStatus.textContent = 'Sending...';
      try {
        const body = new FormData();
        body.append('file', fileInput.files[0]);
        body.append('category', photoCategory.value);
        const response = await fetch(`/api/guest/${token}/images`, { method: 'POST', body });
        if (!response.ok) {
          let detail = response.statusText;
          try { const d = await response.json(); detail = d.detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        fileInput.value = '';
        photoStatus.textContent = 'Sent. Watch the frame.';
      } catch (error) {
        photoStatus.textContent = error.message;
      } finally {
        uploadButton.disabled = false;
      }
    });

    // Message
    const msgForm = document.getElementById('msg-form');
    const msgText = document.getElementById('msg-text');
    const msgButton = document.getElementById('msg-button');
    const msgStatus = document.getElementById('msg-status');
    const charCount = document.getElementById('char-count');

    msgText.addEventListener('input', () => {
      const n = msgText.value.length;
      charCount.textContent = n;
      charCount.parentElement.classList.toggle('over', n > 200);
    });

    msgForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const content = msgText.value.trim();
      if (!content) return;
      msgButton.disabled = true;
      msgStatus.textContent = 'Sending...';
      try {
        const response = await fetch(`/api/guest/${token}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        });
        if (!response.ok) {
          let detail = response.statusText;
          try { const d = await response.json(); detail = d.detail || detail; } catch (_) {}
          throw new Error(detail);
        }
        msgText.value = '';
        charCount.textContent = '0';
        msgStatus.textContent = 'Sent. Watch the frame.';
      } catch (error) {
        msgStatus.textContent = error.message;
      } finally {
        msgButton.disabled = false;
      }
    });
  </script>
</body>
</html>
